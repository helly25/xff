name: Test

on:
  push:
    branches: [main]
  pull_request:

# A branch push is covered by its pull_request run; only `main` needs a push
# run. And cancel superseded runs on the same ref so rapid pushes don't pile up.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  test:
    name: ${{ matrix.os }} / ${{ matrix.config.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        config:
          - name: default
            flags: ""
          - name: clang-asan
            flags: "--config=clang --config=asan"
    steps:
      - uses: actions/checkout@v6
      # bazelisk launches the Bazel release pinned in .bazelversion (9.1.1).
      - uses: bazelbuild/setup-bazelisk@v3
      - name: bazel test
        run: bazel test //... ${{ matrix.config.flags }}
