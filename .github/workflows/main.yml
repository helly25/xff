name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: ["**"]

# A branch push is covered by its pull_request run; only `main` needs a push
# run. And cancel superseded runs on the same ref so rapid pushes don't pile up.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  test:
    name: ${{ matrix.os }} / ${{ matrix.config.name }}
    # Gate the heavy matrix behind the fast pre-flight checks (lint + the XFF.md drift guard), so a
    # stale reference or a lint failure fails in minutes instead of after the full asan build.
    needs: [pre-commit, trunk, xff-md]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        config:
          - name: default
            flags: ""
          - name: clang-asan
            flags: "--config=clang --config=asan"
        exclude:
          # asan on Linux is enough; the macOS asan cell is redundant sanitizer coverage, so drop it.
          # This leaves: ubuntu default, ubuntu clang-asan, macos default.
          - os: macos-latest
            config:
              name: clang-asan
              flags: "--config=clang --config=asan"
    steps:
      - uses: actions/checkout@v6
      # bazelisk launches the Bazel release pinned in .bazelversion (9.1.1).
      - uses: bazelbuild/setup-bazelisk@v3
      # Persist Bazel's repository cache (downloaded external deps) and disk cache
      # (compiled action outputs) so each run reuses prior work instead of fetching
      # and rebuilding from scratch. Keyed by os/config + the lockfile hash only:
      # a per-run github.sha suffix used to mint a fresh ~5 GB asan cache on every
      # commit, and two asan cells alone overflowed GitHub's 10 GB/repo limit, so
      # caches were evicted before they could be reused. A stable key keeps one
      # entry per os/config/lockfile (the hash busts it when deps change); the
      # restore-key seeds a warm base from a previous lockfile after a bump.
      - name: Mount Bazel caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel-disk
            ~/.cache/bazel-repo
          key: bazel-${{ matrix.os }}-${{ matrix.config.name }}-${{ hashFiles('MODULE.bazel.lock', '.bazelversion') }}
          restore-keys: |
            bazel-${{ matrix.os }}-${{ matrix.config.name }}-
      # man_test renders `xff --man` through a roff formatter; it is a required test
      # dependency (no skip). macOS ships mandoc; install it on Linux.
      - name: Install roff formatter (mandoc)
        run: |
          if [ "${RUNNER_OS}" = "Linux" ]; then
            sudo apt-get update && sudo apt-get install -y mandoc
          fi
          command -v mandoc
      # Every job builds in full mode (--config=xff_full), so the composable extras (the @xff_pcre2
      # backend) get the SAME asan / tsan coverage as the core - our PCRE2 C-API wrapper is exactly
      # where a buffer / lifetime / thread bug would hide. The full-only targets are picked up by
      # `//...` automatically (target_compatible_with, no names needed); the @xff_pcre2 module's own
      # tests come via its wildcard. Only the `minimal` job opts out. The lean `xff` binary stays lean
      # here (no extras select), so its tests still assert the extras are absent from it.
      - name: bazel test
        run: >
          bazel test //... @xff_pcre2//... --config=xff_full
          --disk_cache=$HOME/.cache/bazel-disk --repository_cache=$HOME/.cache/bazel-repo
          ${{ matrix.config.flags }}
      # Lint gates run once, on the ubuntu clang-asan cell: its --config=clang
      # build above has already fetched the hermetic clang-format, so
      # tools/clang_format.sh resolves the pinned toolchain version.
      - name: clang-format
        if: matrix.os == 'ubuntu-latest' && matrix.config.name == 'clang-asan'
        run: |
          find xff -type f \( -name '*.cc' -o -name '*.h' \) -print0 \
            | xargs -0 tools/clang_format.sh --dry-run -Werror

  # trunk (https://trunk.io) runs the heavier linters: buildifier, markdownlint,
  # prettier, yamllint, the security scanners, and clang-tidy (local only;
  # CI-skipped without a compile DB, so CI relies on the bazel -Werror gate).
  # Mirrors helly25/mbo.
  trunk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Trunk Check
        uses: trunk-io/trunk-action@v1

  # pre-commit hooks (clang-format, shfmt, shellcheck, actionlint, and the
  # repo-policy text checks incl. no-em-dashes). Mirrors helly25/mbo.
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: pre-commit/action@v3.0.1

  # ThreadSanitizer for the parallel walk (issue #43; mutually exclusive with the
  # asan cell). ubuntu-only and repo-cache-only (no multi-GB disk cache) so the
  # total Actions cache stays under GitHub's 10 GB limit next to the asan caches;
  # the instrumented objects rebuild each run.
  tsan:
    needs: [pre-commit, trunk, xff-md]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: bazelbuild/setup-bazelisk@v3
      - name: Mount Bazel repo cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel-repo
          key: bazel-repo-tsan-${{ hashFiles('MODULE.bazel.lock', '.bazelversion') }}
          restore-keys: |
            bazel-repo-tsan-
      - name: Install roff formatter (mandoc)
        run: sudo apt-get update && sudo apt-get install -y mandoc
      - name: bazel test
        run: >
          bazel test //... @xff_pcre2//... --config=xff_full
          --repository_cache=$HOME/.cache/bazel-repo --config=clang --config=tsan

  # Minimal core archive: prove that dropping the WHOLE extra_modules/ directory (plus the extras'
  # bazel_dep + local_path_override lines) still builds the lean core. This is the regression guard
  # for the "full separation" property (#123) - the shared xff_extras_api base module lives at the
  # top level (not under extra_modules/), and nothing in the core reaches into an extra, so a future
  # core->extra dependency would fail here. The sole job that opts OUT of the extras (every other job
  # runs --config=xff_full); one cell on the single most-default target (lean //xff/cli:xff, ubuntu).
  minimal:
    needs: [pre-commit, trunk, xff-md]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: bazelbuild/setup-bazelisk@v3
      - name: Mount Bazel repo cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel-repo
          key: bazel-repo-minimal-${{ hashFiles('MODULE.bazel.lock', '.bazelversion') }}
          restore-keys: |
            bazel-repo-minimal-
      - name: Strip all extras (simulate a minimal core archive)
        run: |
          rm -rf extra_modules
          sed -i '/bazel_dep(name = "xff_pcre2"/,/^)/d' MODULE.bazel
      - name: bazel build (lean core, extras removed)
        run: bazel build //xff/cli:xff --repository_cache=$HOME/.cache/bazel-repo

  # Fast pre-flight gate: XFF.md is the committed `xff_full --markdown` reference, so regenerate it
  # and fail on any drift (//xff/cli:xff_markdown_test) BEFORE the heavy build/test matrix runs. It
  # builds only xff_full + the diff_test (no asan/tsan, no full suite) and is repo-cache-only (like
  # tsan/minimal), so it is one of the cheap checks the matrix waits on, alongside pre-commit/trunk.
  xff-md:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: bazelbuild/setup-bazelisk@v3
      - name: Mount Bazel repo cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel-repo
          key: bazel-repo-xff-md-${{ hashFiles('MODULE.bazel.lock', '.bazelversion') }}
          restore-keys: |
            bazel-repo-xff-md-
      - name: Verify XFF.md matches xff_full --markdown
        run: >
          bazel test //xff/cli:xff_markdown_test --config=xff_full
          --repository_cache=$HOME/.cache/bazel-repo

  # Single required status check: one job that gates merge on the whole matrix,
  # so branch protection needs only `done`. A yq/jq step self-checks that every
  # workflow job is wired into `needs`, so a newly added job cannot silently
  # escape the gate. Mirrors helly25/mbo.
  done:
    needs: [test, pre-commit, trunk, tsan, minimal, xff-md]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Ensure every job is wired into this gate
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          declared="$(yq '.jobs | keys | .[]' .github/workflows/main.yml | grep -vx done | sort)"
          wired="$(jq -r 'keys[]' <<<"${NEEDS_JSON}" | sort)"
          missing="$(comm -23 <(printf '%s\n' "${declared}") <(printf '%s\n' "${wired}"))"
          if [[ -n "${missing}" ]]; then
            echo "Jobs declared in the workflow but missing from done.needs:"
            while read -r job; do
              echo "::error title=Gate is missing a job::${job} not in done.needs"
            done <<<"${missing}"
            exit 1
          fi
          echo "done covers all $(grep -c . <<<"${declared}") workflow jobs."
      - name: Fail if any dependency did not succeed
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
