# Release: on a version tag push (e.g. `git tag 0.1.0 && git push origin 0.1.0`),
# build the lean and full binaries for Linux and macOS and cut a GitHub release
# with them attached and the CHANGELOG section as the body.
#
# xff is not published to a registry; it ships as a tool. The version is stamped
# from the tag at build time (override-on-release, see tools/release_prep.sh),
# so the repository itself stays at the 0.0.0 sentinel and there are no
# version-bump commits.
#
# The tag is pushed by a maintainer's credentials, so this workflow triggers
# normally (a one-click dispatch that pushed the tag with the default
# GITHUB_TOKEN would NOT, per the "GITHUB_TOKEN does not trigger downstream
# workflows" rule; a PAT-based trigger can be added later if wanted).
name: Release

on:
  push:
    tags:
      # Numeric semver only (e.g. 0.1.0); stricter than "*.*.*".
      - "[0-9]+.[0-9]+.[0-9]+"

permissions: read-all

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      # If one platform fails, do not publish a half-built release.
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: macos
    steps:
      - uses: actions/checkout@v6
      # bazelisk launches the Bazel release pinned in .bazelversion.
      - uses: bazelbuild/setup-bazelisk@v3
      - name: Mount Bazel caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel-disk
            ~/.cache/bazel-repo
          key: bazel-release-${{ matrix.os }}-${{ hashFiles('MODULE.bazel.lock', '.bazelversion') }}
          restore-keys: |
            bazel-release-${{ matrix.os }}-
            bazel-${{ matrix.os }}-default-
      # Stamp the tag version into MODULE.bazel + main.cc and verify consistency
      # (discard the notes it prints; the release job re-derives them).
      - name: Stamp version + verify
        run: tools/release_prep.sh "${GITHUB_REF_NAME}" >/dev/null
      - name: Build lean + full binaries
        run: |
          bazel build -c opt //xff/cli:xff \
            --disk_cache="${HOME}/.cache/bazel-disk" --repository_cache="${HOME}/.cache/bazel-repo"
          bazel build -c opt --config=xff_full //xff/cli:xff_full \
            --disk_cache="${HOME}/.cache/bazel-disk" --repository_cache="${HOME}/.cache/bazel-repo"
      - name: Stage artifacts
        env:
          PLATFORM: ${{ matrix.platform }}
        run: |
          arch="$(uname -m)"
          mkdir -p dist
          lean="$(bazel cquery -c opt --output=files //xff/cli:xff 2>/dev/null)"
          full="$(bazel cquery -c opt --config=xff_full --output=files //xff/cli:xff_full 2>/dev/null)"
          install -m 0755 "${lean}" "dist/xff-${PLATFORM}-${arch}"
          install -m 0755 "${full}" "dist/xff_full-${PLATFORM}-${arch}"
      - uses: actions/upload-artifact@v4
        with:
          name: xff-${{ matrix.platform }}
          path: dist/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      # Creating a release writes to the repo's releases.
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      # release_prep.sh prints only the CHANGELOG section to stdout (the stamp it
      # also does here is a harmless no-op; nothing is built in this job).
      - name: Generate release notes
        run: tools/release_prep.sh "${GITHUB_REF_NAME}" > release-notes.md
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${GITHUB_REF_NAME}"
          --title "${GITHUB_REF_NAME}"
          --notes-file release-notes.md
          --verify-tag
          --prerelease
          dist/*
